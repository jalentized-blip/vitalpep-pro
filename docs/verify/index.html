<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalPep Pro — Redirecting to Verification...</title>
    <script src="../config.js"></script>
    <script>
        (function() {
            var t = new URLSearchParams(window.location.search).get('t') || '';
            if (t && typeof VERIFY_DOMAIN !== 'undefined') {
                window.location.replace(VERIFY_DOMAIN + '/verify/?t=' + encodeURIComponent(t));
            } else if (typeof VERIFY_DOMAIN !== 'undefined') {
                window.location.replace(VERIFY_DOMAIN + '/verify/');
            }
        })();
    </script>
    <style>
        body { margin: 0; background: #0a0f1e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
        .box { text-align: center; color: #fff; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(93,173,226,.2); border-top-color: #5dade2; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: rgba(255,255,255,.6); font-size: .9rem; margin: 0; }
        a { color: #5dade2; }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <p>Redirecting to VitalPep Pro verification&hellip;</p>
        <p style="margin-top:12px;font-size:.8rem">
            If you are not redirected, <a id="fallback" href="#">click here</a>.
        </p>
    </div>
    <script>
        // Set fallback link
        var t = new URLSearchParams(window.location.search).get('t') || '';
        var link = typeof VERIFY_DOMAIN !== 'undefined'
            ? VERIFY_DOMAIN + '/verify/?t=' + encodeURIComponent(t)
            : 'https://vitalpeppro.com/verify/';
        document.getElementById('fallback').href = link;
    </script>
</body>
</html>
